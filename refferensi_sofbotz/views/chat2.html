<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Soft Botz</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-image: url("https://w0.peakpx.com/wallpaper/6/859/HD-wallpaper-mai-sakurajima-anime-x-reality-tokyo-seishun-buta-yar%C5%8D-japan-anime-aesthetic-anime-anime.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        color: white;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      header {
        background-color: rgba(0, 0, 0, 0.7);
        padding: 10px 20px;
        text-align: center;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        animation: slideDown 1s ease-out;
        border-radius: 10px;
        margin: 10px 20px;
      }
      @keyframes slideDown {
        from {
          transform: translateY(-100%);
        }
        to {
          transform: translateY(0);
        }
      }
      header h1 {
        margin: 0;
        font-size: 2em;
        color: #f0f8ff;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        animation: rgbText 3s infinite;
      }
      @keyframes rgbText {
        0% {
          color: rgb(255, 0, 0);
        }
        33% {
          color: rgb(0, 255, 0);
        }
        66% {
          color: rgb(0, 0, 255);
        }
        100% {
          color: rgb(255, 0, 0);
        }
      }
      iframe {
        width: 80%;
        height: 70%;
        border: none;
        background-color: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(10px);
        border-radius: 10px;
        animation: fadeIn 2s ease-in;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        transform-style: preserve-3d;
        transform: perspective(1000px) rotateY(15deg);
        transition: transform 0.3s ease-in-out;
        outline: 2px solid transparent; /* Menyembunyikan outline default */
        outline-offset: -10px; /* Menyembunyikan outline default */
        border: 2px solid transparent; /* Menyembunyikan border default */
        border-image: linear-gradient(
            to right,
            rgb(255, 0, 0),
            rgb(0, 255, 0),
            rgb(0, 0, 255),
            rgb(255, 0, 0)
          )
          1;
        border-image-slice: 1;
      }
      iframe:hover {
        transform: perspective(1000px) rotateY(0deg);
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .line-shadow {
        position: absolute;
        width: 100%;
        height: 2px;
        background: linear-gradient(
          to right,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.5) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        top: 0;
        left: 0;
        animation: moveLine 4s linear infinite;
      }
      @keyframes moveLine {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }
      a {
        display: flex;
        flex-direction: column;
        flex: 1;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        width: 100%;
        animation: zoomIn 1.5s ease-in-out;
      }
      @keyframes zoomIn {
        from {
          transform: scale(0.8);
        }
        to {
          transform: scale(1);
        }
      }
      .snowflake {
        position: absolute;
        top: -10px;
        color: white;
        font-size: 1em;
        user-select: none;
        pointer-events: none;
        animation: fall linear infinite;
      }
      @keyframes fall {
        to {
          transform: translateY(100vh);
        }
      }
      .snowflake:nth-child(1) {
        left: 10%;
        animation-duration: 5s;
        animation-delay: 0s;
        font-size: 1.5em;
      }
      .snowflake:nth-child(2) {
        left: 20%;
        animation-duration: 7s;
        animation-delay: 1s;
        font-size: 1em;
      }
      .snowflake:nth-child(3) {
        left: 30%;
        animation-duration: 10s;
        animation-delay: 2s;
        font-size: 1.2em;
      }
      .snowflake:nth-child(4) {
        left: 40%;
        animation-duration: 8s;
        animation-delay: 3s;
        font-size: 1.4em;
      }
      .snowflake:nth-child(5) {
        left: 50%;
        animation-duration: 6s;
        animation-delay: 4s;
        font-size: 1em;
      }
      .snowflake:nth-child(6) {
        left: 60%;
        animation-duration: 5s;
        animation-delay: 5s;
        font-size: 1.6em;
      }
      .snowflake:nth-child(7) {
        left: 70%;
        animation-duration: 9s;
        animation-delay: 6s;
        font-size: 1.1em;
      }
      .snowflake:nth-child(8) {
        left: 80%;
        animation-duration: 6s;
        animation-delay: 7s;
        font-size: 1.3em;
      }
      .snowflake:nth-child(9) {
        left: 90%;
        animation-duration: 8s;
        animation-delay: 8s;
        font-size: 1.2em;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Soft Botz Live Chat</h1>
    </header>
    <div class="snowflake">❄️</div>
    <div class="snowflake">❄️</div>
    <div class="snowflake">❄️</div>
    <div class="snowflake">❄️</div>
    <div class="snowflake">❄️</div>
    <div class="snowflake">❄️</div>
    <div class="snowflake">❄️</div>
    <div class="snowflake">❄️</div>
    <div class="snowflake">❄️</div>
    <a href="#">
      <iframe
        src="https://www5.cbox.ws/box/?boxid=949845&boxtag=KMvUCN"
        allowtransparency="yes"
        allow="autoplay"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        scrolling="auto"
      >
        <div class="line-shadow"></div>
      </iframe>
    </a>
  </body>
</html>
