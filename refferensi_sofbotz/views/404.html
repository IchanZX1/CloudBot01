<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Not Found</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        font-family: "Inter", sans-serif;
      }

      .wrapper {
        width: 100%;
        max-width: 1100px;
        padding: 24px;
      }

      .frame {
        position: relative;
        width: 100%;
        aspect-ratio: 16/9;
        border-radius: 20px;
        overflow: hidden;
        background: linear-gradient(135deg, #f1b7cc, #b2c1ff);
        box-shadow:
          0 40px 100px rgba(0, 0, 0, 0.65),
          inset 0 0 0 1px rgba(255, 255, 255, 0.12);
        animation: fadeIn 0.8s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* TOP DECOR */
      .top-decor {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      }

      .top-decor i {
        font-size: 14px;
        color: #ffffffaa;
        animation: blink 3s ease-in-out infinite;
      }

      .top-decor i:nth-child(2) {
        animation-delay: 0.6s;
      }
      .top-decor i:nth-child(3) {
        animation-delay: 1.2s;
      }
      .top-decor i:nth-child(4) {
        animation-delay: 1.8s;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }

      /* CHARACTERS */
      .character {
        position: absolute;
        bottom: 44px;
        width: 34%;
        max-width: 340px;
        opacity: 0.95;
      }

      .character.left {
        left: 0;
      }
      .character.right {
        right: 0;
        transform: scaleX(-1);
      }

      .character img {
        width: 100%;
        display: block;
      }

      /* CENTER */
      .center {
        position: absolute;
        inset: 44px 0 36px 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .code {
        font-size: 96px;
        font-weight: 300;
        letter-spacing: 10px;
        color: #ffffff;
        text-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
      }

      .jp {
        font-size: 14px;
        letter-spacing: 6px;
        color: #ffffffdd;
        margin-bottom: 6px;
      }

      .desc {
        margin-top: 14px;
        font-size: 14px;
        color: #ffffffee;
        line-height: 1.7;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }

      /* BUTTONS */
      .actions {
        margin-top: 26px;
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 22px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.35);
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        text-decoration: none;
        backdrop-filter: blur(10px);
        transition: 0.25s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
        background: rgba(0, 0, 0, 0.55);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      }

      /* BOTTOM RUNNING TEXT */
      .ticker {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 36px;
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(10px);
        overflow: hidden;
        border-top: 1px solid rgba(255, 255, 255, 0.15);
      }

      .ticker-track {
        display: flex;
        width: max-content;
        animation: tickerMove 18s linear infinite;
      }

      .ticker span {
        padding: 0 40px;
        font-size: 12px;
        letter-spacing: 2px;
        color: #ffffffcc;
        white-space: nowrap;
      }

      @keyframes tickerMove {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }

      /* MOBILE */
      @media (max-width: 768px) {
        .frame {
          aspect-ratio: 4/3;
        }
        .character {
          width: 42%;
        }
        .code {
          font-size: 72px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="frame">
        <div class="top-decor">
          <i class="fa-solid fa-circle"></i>
          <i class="fa-solid fa-wifi"></i>
          <i class="fa-solid fa-shield-halved"></i>
          <i class="fa-solid fa-bolt"></i>
        </div>

        <div class="character left">
          <img src="https://lunara.softbotz.my.id/f/jMhdqb61Qx73.png" />
        </div>

        <div class="character right">
          <img src="https://lunara.softbotz.my.id/f/jMhdqb61Qx73.png" />
        </div>

        <div class="center">
          <div>
            <div class="jp">よん・よん</div>
            <div class="code">404</div>
            <div class="desc">
              We are sorry for this little trouble you found.<br />
              The page you are looking for does not exist.
            </div>

            <div class="actions">
              <a href="/" class="btn"><i class="fa-solid fa-house"></i>Home</a>
              <a href="javascript:history.back()" class="btn"
                ><i class="fa-solid fa-arrow-left"></i>Back</a
              >
              <a href="/status" class="btn"
                ><i class="fa-solid fa-signal"></i>Status</a
              >
            </div>
          </div>
        </div>

        <div class="ticker">
          <div class="ticker-track">
            <span
              >SOFTBOTZ SYSTEM · NETWORK ACTIVE · ERROR 404 · PAGE NOT
              FOUND</span
            >
            <span
              >SOFTBOTZ SYSTEM · NETWORK ACTIVE · ERROR 404 · PAGE NOT
              FOUND</span
            >
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
